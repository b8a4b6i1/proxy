<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>///</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --black: #000000;
    --white: #e0e0e0;
    --cyan: #00d4ff;
    --red: #ff2040;
    --yellow: #e8d44d;
    --dim: #333;
    --glow: rgba(0, 212, 255, 0.15);
  }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Scan lines overlay */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.15) 2px,
      rgba(0, 0, 0, 0.15) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* Noise texture */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 99;
  }

  /* ===== LOGIN STATE ===== */

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(16px, 4vh, 32px);
    padding: clamp(12px, 3vw, 24px);
    position: relative;
    z-index: 10;
    transition: opacity 0.5s;
    width: 100%;
  }

  .container.hidden {
    opacity: 0;
    pointer-events: none;
    position: absolute;
  }

  .proxy-wrap {
    position: relative;
    width: clamp(280px, 80vw, 400px);
    height: clamp(280px, 80vw, 400px);
  }

  .proxy-img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    filter: contrast(1.1) brightness(0.95);
    animation: glitchImg 8s infinite;
  }

  .proxy-wrap::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(
      transparent 0%,
      rgba(0, 212, 255, 0.03) 50%,
      transparent 100%
    );
    animation: scanMove 4s linear infinite;
    pointer-events: none;
  }

  @keyframes scanMove {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(100%); }
  }

  @keyframes glitchImg {
    0%, 95%, 100% { transform: translate(0); filter: contrast(1.1) brightness(0.95); }
    96% { transform: translate(-2px, 1px); filter: contrast(1.3) brightness(1.1) hue-rotate(10deg); }
    97% { transform: translate(2px, -1px); filter: contrast(1.1) brightness(0.95); }
    98% { transform: translate(-1px, -1px); filter: contrast(1.2) brightness(1.05) hue-rotate(-5deg); }
  }

  .input-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .field-wrap {
    position: relative;
    display: flex;
    align-items: center;
    gap: 0;
  }

  .prefix {
    background: var(--dim);
    color: var(--cyan);
    padding: clamp(10px, 2.5vw, 14px) clamp(8px, 2vw, 12px);
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(13px, 3.5vw, 16px);
    border: 1px solid #444;
    border-right: none;
    letter-spacing: 1px;
    user-select: none;
  }

  input[type="text"] {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid #444;
    color: var(--white);
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(16px, 4.5vw, 18px);
    padding: clamp(12px, 3vw, 16px);
    width: clamp(220px, 60vw, 300px);
    letter-spacing: 2px;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
    -webkit-appearance: none;
    border-radius: 0;
    touch-action: manipulation;
  }

  input[type="text"]:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 12px var(--glow), inset 0 0 8px var(--glow);
  }

  input[type="text"]::placeholder {
    color: #555;
    letter-spacing: 4px;
    font-size: 12px;
  }

  .btn {
    background: transparent;
    border: 1px solid #555;
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(12px, 3.5vw, 14px);
    padding: clamp(10px, 2.5vw, 14px) clamp(28px, 8vw, 40px);
    cursor: pointer;
    letter-spacing: 3px;
    text-transform: uppercase;
    transition: all 0.3s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    min-height: 48px;
  }

  .btn:hover {
    border-color: var(--cyan);
    color: var(--cyan);
    box-shadow: 0 0 15px var(--glow);
    text-shadow: 0 0 8px var(--cyan);
  }

  .error input[type="text"] {
    border-color: var(--red);
    box-shadow: 0 0 12px rgba(255, 32, 64, 0.2);
    animation: shake 0.4s ease;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  .msg {
    font-size: clamp(10px, 2.8vw, 12px);
    letter-spacing: 2px;
    height: 16px;
    color: transparent;
    transition: color 0.3s;
  }

  .msg.visible {
    color: var(--red);
  }

  /* ===== TRANSITION STATE ===== */

  .transition-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: var(--black);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s;
  }

  .transition-overlay.active {
    opacity: 1;
    pointer-events: all;
  }

  .transition-text {
    font-size: clamp(14px, 4vw, 20px);
    letter-spacing: clamp(3px, 1vw, 6px);
    color: var(--cyan);
    animation: blink 1s steps(2) infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ===== VIDEO STATE ===== */

  .video-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.8s;
    padding: 20px;
  }

  .video-container.active {
    opacity: 1;
    pointer-events: all;
  }

  .video-wrap {
    position: relative;
    width: 100%;
    max-width: 800px;
    border: 1px solid #333;
    box-shadow: 0 0 40px rgba(0, 212, 255, 0.08);
    overflow: hidden;
    background: #000;
  }

  .video-wrap video {
    width: 100%;
    height: auto;
    display: block;
  }

  .video-label {
    font-size: clamp(8px, 2.5vw, 11px);
    letter-spacing: clamp(2px, 0.8vw, 4px);
    color: #333;
    margin-top: clamp(10px, 2vh, 20px);
    text-transform: uppercase;
  }

  /* Decorative ASCII corners */
  .corner {
    position: fixed;
    font-size: 10px;
    color: #222;
    letter-spacing: 1px;
    line-height: 1.4;
    pointer-events: none;
    z-index: 5;
  }

  .corner.tl { top: 20px; left: 20px; }
  .corner.tr { top: 20px; right: 20px; text-align: right; }
  .corner.bl { bottom: 20px; left: 20px; }
  .corner.br { bottom: 20px; right: 20px; text-align: right; }

  /* ===== RESPONSIVE ===== */

  /* Allow scroll on short viewports */
  @media (max-height: 580px) {
    body {
      justify-content: flex-start;
      padding-top: 20px;
      overflow-y: auto;
    }
  }

  /* Hide corners on small screens */
  @media (max-width: 480px) {
    .corner { display: none; }
    .video-container { padding: 0; }
    .video-wrap { border: none; box-shadow: none; }
  }

  /* Landscape phones — side by side layout */
  @media (max-height: 500px) and (orientation: landscape) {
    .container { flex-direction: row; gap: 32px; }
    .proxy-wrap { width: 40vh; height: 40vh; flex-shrink: 0; }
    .input-area { align-items: flex-start; }
    body { justify-content: center; overflow: hidden; }
    .video-container { padding: 8px; }
    .video-wrap { max-width: 90vw; }
  }
</style>
</head>
<body>

<!-- Decorative ASCII corners -->
<div class="corner tl">╔══<br>║&nbsp;&nbsp;</div>
<div class="corner tr">══╗<br>&nbsp;&nbsp;║</div>
<div class="corner bl">║&nbsp;&nbsp;<br>╚══</div>
<div class="corner br">&nbsp;&nbsp;║<br>══╝</div>

<!-- LOGIN STATE -->
<div class="container" id="loginContainer">
  <div class="proxy-wrap">
    <img src="proxy.png" alt="" class="proxy-img" draggable="false">
  </div>

  <div class="input-area" id="inputArea">
    <div class="field-wrap">
      <span class="prefix">&gt;_</span>
      <input type="text" id="passInput" placeholder="· · · · · · ·" maxlength="12" autocomplete="off" spellcheck="false">
    </div>
    <button class="btn" id="submitBtn">entrar</button>
    <div class="msg" id="msg">acceso denegado</div>
  </div>
</div>

<!-- TRANSITION STATE -->
<div class="transition-overlay" id="transitionOverlay">
  <div class="transition-text">FORTUNA</div>
</div>

<!-- VIDEO STATE -->
<div class="video-container" id="videoContainer">
  <div class="video-wrap">
    <video id="videoPlayer" controls playsinline preload="none">
      <source src="video.mp4" type="video/mp4">
    </video>
  </div>
  <div class="video-label">jirafa ardiendo · última versión del mundo</div>
</div>

<script>
  // === CONFIGURATION ===
  // Password must be entered in ALL CAPS
  const PASSWORD = 'FORTUNA';
  // === END CONFIGURATION ===

  const input = document.getElementById('passInput');
  const btn = document.getElementById('submitBtn');
  const msg = document.getElementById('msg');
  const inputArea = document.getElementById('inputArea');
  const loginContainer = document.getElementById('loginContainer');
  const transitionOverlay = document.getElementById('transitionOverlay');
  const videoContainer = document.getElementById('videoContainer');
  const videoPlayer = document.getElementById('videoPlayer');

  let attempts = 0;

  function check() {
    const val = input.value.trim();
    if (!val) return;

    if (val === PASSWORD) {
      // Phase 1: fade out login
      loginContainer.style.opacity = '0';
      loginContainer.style.transition = 'opacity 0.5s';

      // Phase 2: show transition text
      setTimeout(() => {
        loginContainer.classList.add('hidden');
        transitionOverlay.classList.add('active');
      }, 600);

      // Phase 3: hide transition, show video
      setTimeout(() => {
        transitionOverlay.style.transition = 'opacity 0.6s';
        transitionOverlay.style.opacity = '0';
      }, 2200);

      setTimeout(() => {
        transitionOverlay.classList.remove('active');
        transitionOverlay.style.display = 'none';
        videoContainer.classList.add('active');
        videoPlayer.play().catch(() => {});
      }, 2800);

    } else {
      // Fail
      attempts++;
      inputArea.classList.add('error');
      msg.classList.add('visible');
      input.value = '';
      input.focus();

      if (attempts >= 5) {
        msg.textContent = 'proxy no te reconoce';
      } else if (attempts >= 3) {
        msg.textContent = 'palabra incorrecta';
      }

      setTimeout(() => {
        inputArea.classList.remove('error');
      }, 600);

      setTimeout(() => {
        msg.classList.remove('visible');
      }, 2500);
    }
  }

  btn.addEventListener('click', check);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') check();
  });

  input.focus();

  // Subtle random glitch on proxy image
  const proxyImg = document.querySelector('.proxy-img');
  setInterval(() => {
    if (Math.random() > 0.92) {
      const r = Math.random();
      if (r < 0.33) {
        proxyImg.style.filter = 'contrast(1.4) brightness(1.15) hue-rotate(15deg)';
      } else if (r < 0.66) {
        proxyImg.style.clipPath = `inset(${Math.random()*40}% 0 ${Math.random()*40}% 0)`;
      } else {
        proxyImg.style.transform = `translate(${(Math.random()-0.5)*4}px, ${(Math.random()-0.5)*4}px)`;
      }
      setTimeout(() => {
        proxyImg.style.filter = 'contrast(1.1) brightness(0.95)';
        proxyImg.style.clipPath = 'none';
        proxyImg.style.transform = 'translate(0)';
      }, 80 + Math.random() * 120);
    }
  }, 300);
</script>

</body>
</html>
